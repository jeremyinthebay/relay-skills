<!DOCTYPE html><html><head><meta charset="utf-8"><title>brand logo contact sheet</title>
<style>
 body{background:#0f1115;color:#e8eaed;font:13px system-ui;padding:20px}
 .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:14px}
 .c{text-align:center}
 .tile{background:#fff;padding:2px;border-radius:5px;width:22px;height:22px;display:inline-flex;
   align-items:center;justify-content:center;margin-bottom:4px}
 .tile img{width:100%;height:100%;object-fit:contain}
 .big{width:44px;height:44px}
 .n{font-size:10px;color:#9aa4b2;word-break:break-all}
 h2{font-size:13px;color:#6b7686;margin:18px 0 8px;letter-spacing:.08em;text-transform:uppercase}
</style></head><body>
<h2>22px tile (as it appears inline) — then 44px. LOOK at these: pixel size does not tell you it is the right brand.</h2>
<div class="grid" id="g"></div>
<script>
const D={united:"united.com",aeroplan:"aeroplan.com",avianca:"lifemiles.com",turkish:"turkishairlines.com",
ana:"ana.co.jp",singapore:"singaporeair.com",eva:"eva-air.com",american:"aa.com",britishairways:"britishairways.com",
iberia:"iberia.com",qatar:"qatarairways.com",cathay:"cathaypacific.com",alaska:"alaskaair.com",qantas:"qantas.com",
finnair:"finnair.com",delta:"delta.com",flyingblue:"flyingblue.com",virginatlantic:"virginatlantic.com",
jetblue:"jetblue.com",southwest:"southwest.com",emirates:"emirates.com",etihad:"etihad.com",aerlingus:"aerlingus.com",
korean:"koreanair.com",lufthansa:"miles-and-more.com",hyatt:"hyatt.com",hilton:"hilton.com",marriott:"marriott.com",
ihg:"ihg.com",choice:"choicehotels.com",wyndham:"wyndhamhotels.com",accor:"accor.com",amex:"americanexpress.com",
chase:"chase.com",citi:"citi.com",capone:"capitalone.com",bilt:"biltrewards.com",wells:"wellsfargo.com",costco:"costco.com"};
const g=document.getElementById('g');
for(const [id,dom] of Object.entries(D)){
  const u=`https://www.google.com/s2/favicons?sz=64&domain=${dom}`;
  g.insertAdjacentHTML('beforeend',
   `<div class="c"><span class="tile"><img src="${u}" data-id="${id}"></span>
    <span class="tile big"><img src="${u}"></span>
    <div class="n">${id}</div></div>`);
}
</script></body></html>
